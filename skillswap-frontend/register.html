<!DOCTYPE html>
<html>
<head>
    <title>Register - SkillSwap</title>


    <link rel="stylesheet" href="./css/register.css">
</head>

<body>

<div class="container">
    <h2>SkillSwap Register</h2>

    <form id="registerForm" method="post">
        <p align="left" style="color:red" id="firstnameerror"></p>
        <input type="text" id="firstname" name="firstname" placeholder="First Name" required>
        <p align="left" style="color:red" id="lastnameerror"></p>
       <input type="text" id="lastname" name="lastname" placeholder="Last Name" required>
       <p align="left" style="color:red" id="useriderror"></p>
       <input type="text" id="userid" name="userid" placeholder="User ID" required>
       <p align="left" style="color:red" id="emailerror"></p>
       <input type="email" id="email" name="email" placeholder="Email" required>
        
      <input type="text" id="mobileno" name="mobileno" placeholder="Mobile Number" required>

      <input type="text" id="bio" name="bio" placeholder="Short Bio">
        <p align="left" style="color:red" id="passworderror"></p>
      <input type="password" id="password" name="password" placeholder="Password" required>
      <p align="left" style="color:red" id="confirmpassworderror"></p>
      <input type="password" id="confirmpassword" name="confirmpassword" placeholder="Confirm Password" required>


        <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="login.html">Login</a></p>
</div>

</body>
<script type="module" src="./js/register.js">


</script>
</html>
